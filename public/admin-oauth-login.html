<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Christ Revolution Ministries</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-900">Admin Login</h1>
            <p class="text-gray-600 mt-2">Sign in with your GitHub account</p>
        </div>

        <!-- Main content container with fixed height for consistent alignment -->
        <div class="min-h-[200px] flex flex-col justify-center">
            <div id="loginSection">
                <button 
                    onclick="initiateGitHubLogin()" 
                    class="w-full bg-gray-900 text-white px-4 py-3 rounded-md hover:bg-gray-800 transition duration-200 flex items-center justify-center font-medium"
                >
                    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 0C4.477 0 0 4.484 0 10.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0110 4.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.203 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.942.359.31.678.921.678 1.856 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0020 10.017C20 4.484 15.522 0 10 0z" clip-rule="evenodd"></path>
                    </svg>
                    Sign in with GitHub
                </button>

                <div class="mt-6 text-sm text-gray-600 text-center space-y-2 bg-gray-50 p-4 rounded-md">
                    <p class="font-medium text-gray-700">Requirements:</p>
                    <div class="space-y-1">
                        <p>• You need to be added as a repository collaborator</p>
                        <p>• Contact the developer to get access</p>
                    </div>
                </div>
            </div>

            <div id="loadingSection" style="display: none;">
                <div class="text-center py-8">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-gray-900 mx-auto"></div>
                    <p class="mt-4 text-gray-600 font-medium">Authenticating...</p>
                    <p class="text-sm text-gray-500 mt-1">Please wait while we verify your credentials</p>
                </div>
            </div>

            <div id="successSection" style="display: none;">
                <div class="text-center py-8">
                    <div class="inline-flex items-center justify-center w-12 h-12 bg-green-100 rounded-full mx-auto mb-4">
                        <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                    </div>
                    <p class="text-green-700 font-medium" id="successMessage">Authentication successful!</p>
                    <p class="text-sm text-gray-600 mt-1">Redirecting to admin panel...</p>
                </div>
            </div>

            <div id="errorSection" style="display: none;">
                <div class="bg-red-50 border border-red-200 rounded-md p-4">
                    <div class="flex">
                        <div class="flex-shrink-0">
                            <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
                            </svg>
                        </div>
                        <div class="ml-3">
                            <h3 class="text-sm font-medium text-red-800">Authentication Error</h3>
                            <p class="mt-1 text-sm text-red-700" id="errorMessage"></p>
                            <button onclick="resetLogin()" class="mt-3 inline-flex items-center px-3 py-1 border border-red-300 text-sm font-medium rounded-md text-red-700 bg-red-50 hover:bg-red-100 transition duration-200">
                                Try Again
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // GitHub OAuth Configuration - Environment Aware
        const isStaging = window.location.hostname === 'dev.christrevolutionministries.org';
        
        // Staging OAuth App (create this one)
        const STAGING_CLIENT_ID = 'Ov23liARElhba3VAJmy6';
        
        // Production OAuth App  
        const PRODUCTION_CLIENT_ID = 'Ov23liMH6HZyGI4D0Az8';
        
        // Use appropriate Client ID based on environment
        const GITHUB_CLIENT_ID = isStaging ? STAGING_CLIENT_ID : PRODUCTION_CLIENT_ID;
        
        // Check if returning from OAuth callback
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const error = urlParams.get('error');
            
            if (error) {
                showError('GitHub authentication was cancelled or failed');
            } else if (code) {
                handleOAuthCallback(code);
            }
        });

        function initiateGitHubLogin() {
            const state = generateRandomState();
            localStorage.setItem('oauth_state', state);
            
            // Always use the Vercel admin URL as redirect URI - this is the registered OAuth callback
            const redirectUri = 'https://crm-admin-beta.vercel.app/api/auth/github';
            
            const authUrl = `https://github.com/login/oauth/authorize?` +
                `client_id=${GITHUB_CLIENT_ID}&` +
                `redirect_uri=${encodeURIComponent(redirectUri)}&` +
                `scope=repo&` +
                `state=${state}`;
            
            window.location.href = authUrl;
        }

        async function handleOAuthCallback(code) {
            showLoading();
            
            try {
                // Exchange code for access token
                const response = await fetch('/api/auth/github', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ code })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to authenticate');
                }
                
                // Store access token and user info for compatibility with existing admin
                localStorage.setItem('github-token', data.access_token);
                localStorage.setItem('github-user', JSON.stringify(data.user));
                
                // Set session ID with timestamp for existing admin layout compatibility
                const sessionValue = `github-oauth-session:${Date.now()}`;
                localStorage.setItem('admin-session', sessionValue);
                
                // Show success message and redirect
                showSuccess('Authentication successful! Redirecting to admin panel...');
                
                setTimeout(() => {
                    window.location.href = '/admin/';
                }, 1000);
                
            } catch (error) {
                console.error('OAuth callback error:', error);
                showError(error.message);
            }
        }

        function showLoading() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('errorSection').style.display = 'none';
            document.getElementById('loadingSection').style.display = 'block';
        }

        function showError(message) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('loadingSection').style.display = 'none';
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorSection').style.display = 'block';
        }

        function showSuccess(message) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('loadingSection').style.display = 'none';
            document.getElementById('errorSection').style.display = 'none';
            
            document.getElementById('successMessage').textContent = message;
            document.getElementById('successSection').style.display = 'block';
        }

        function resetLogin() {
            document.getElementById('errorSection').style.display = 'none';
            document.getElementById('loadingSection').style.display = 'none';
            document.getElementById('successSection').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
        }

        function generateRandomState() {
            return Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        }
    </script>
</body>
</html>
